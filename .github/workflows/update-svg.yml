name: Update AI Coding Blue Wall

on:
  push:
    paths:
      - 'data/ai-usage.json'
      - 'data/codex-cloud-activity.json'
  workflow_dispatch:

jobs:
  update-svg:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate SVG
        run: |
          python scripts/render_blue_wall.py \
            --data data/ai-usage.json \
            --output assets/ai-blue-wall.svg \
            --username ${{ github.repository_owner }}

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add assets/ai-blue-wall.svg
          git diff --staged --quiet || git commit -m "Update AI coding blue wall SVG"
          git push
